<!DOCTYPE html>
<html lang="fr">

<head>

    <title>🧩 Défi chrono — Menu burger</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <span class="logo">Défi</span>
        <button class="menu-btn">☰</button>
    </header>

    <nav class="menu">
        <ul>
            <li><a href="#">Accueil</a></li>
            <li><a href="#">Projets</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main>

        <div class="consigne">
            <h1>🧩 Défi chrono</h1>
            <nav class="menu">
                <p>Faites fonctionner ce menu burger en <strong>le moins de lignes de JS possible</strong>.</p>
                <p>Le bouton <button class="menu-btn" aria-expanded="false"><code>☰</code></button>doit ouvrir/fermer le
                    menu.<br>La touche <code>Escape</code> doit le fermer.</p>
                <p>Le CSS est prêt : la classe <code>.is-open</code> sur le <code>&lt;nav&gt;</code> affiche le menu.
                </p>
        </div>
        </nav>
    </main>
    <script src="script.js"></script>
